- name: configure catalouge server
  hosts: catalouge
  become: yes
  tasks:
  - name: enable node js 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs 20
    package:
      name: nodejs
      state: present
  - name: create roboshop system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshopshop System user"
      